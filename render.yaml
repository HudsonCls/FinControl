# Blueprint do Render para a API do FinControl.
# No Render: New > Blueprint > conecte este repositório. Ele lê este arquivo.
# As variáveis com "sync: false" você preenche no painel do Render (Environment).
services:
  - type: web
    name: fincontrol-api
    runtime: node
    rootDir: backend
    plan: free
    # --include=dev garante que prisma/typescript/tsx (devDeps) existam no build.
    buildCommand: npm install --include=dev && npm run render:build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Supabase: "Connection pooling" (porta 6543) com ?pgbouncer=true para a app.
      - key: DATABASE_URL
        sync: false
      # Supabase: conexão direta (porta 5432) — usada pelo prisma db push no build.
      - key: DIRECT_URL
        sync: false
      # Gerado automaticamente pelo Render (seguro).
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # URL do frontend na Vercel (ex: https://fincontrol.vercel.app). Use "*" para liberar tudo.
      - key: CORS_ORIGIN
        sync: false
      # Opcionais — deixe em branco se não usar.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: fincontrol-verify
      - key: WHATSAPP_WEBHOOK_SECRET
        sync: false
      # E-mails reais (código de redefinição de senha / verificação de e-mail).
      # Sem chave, roda em modo simulado (só aparece no log do Render).
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "FinControl <onboarding@resend.dev>"
